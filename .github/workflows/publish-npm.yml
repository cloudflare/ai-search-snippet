name: Publish to NPM

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          set -euo pipefail
          git fetch --tags
          SHA="${{ github.event.workflow_run.head_sha }}"
          TAG="$(git tag --points-at "$SHA" | grep -E '^v' | head -n 1 || true)"
          if [ -z "$TAG" ]; then
            TAG="sha-${SHA:0:7}"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter @cloudflare/ai-search-snippet run build

      - name: Publish
        run: pnpm --filter @cloudflare/ai-search-snippet publish --access public --no-git-checks
