name: Deploy to Cloudflare Workers

on:
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure Wrangler config and entrypoint exist
        run: |
          set -euo pipefail
          if [ ! -f apps/workers/wrangler.jsonc ]; then
            echo "apps/workers/wrangler.jsonc not found. Add it to the repo to enable deployments." >&2
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Ensure assets output exists
        run: |
          set -euo pipefail
          if [ ! -d apps/workers/dist-app ]; then
            echo "apps/workers/dist-app not found. Expected Vite app build output." >&2
            exit 1
          fi

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/workers
        run: npx wrangler deploy
